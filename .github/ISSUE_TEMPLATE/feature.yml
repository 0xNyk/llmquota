name: Feature request
description: Propose a scoped improvement
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user problem, constraint, or unsupported use case.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
      description: Describe the observable result, not only an implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility and risks
      description: Note API, migration, security, privacy, accessibility, or operational effects.
